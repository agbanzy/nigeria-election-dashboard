name: CI

on:
  push:
    branches: [main, "refactor/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Type check
        # Advisory until the pre-existing strict-mypy debt (~115 findings across
        # the older modules, tracked in the 2026-07-19 audit as F-605) is paid
        # down. Ruff + pytest are the hard gates; new code is expected to be
        # mypy-clean. Flip continue-on-error off once the backlog is cleared.
        run: mypy app
        continue-on-error: true
      - name: Tests
        run: pytest -ra
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://placeholder

  e2e:
    name: e2e (live deployment)
    runs-on: ubuntu-latest
    # Only run e2e on push to main (after the merge) so the deploy has a
    # chance to roll forward. PRs run lint/build/tests but not e2e.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Wait for DO deploy to roll out
        # POST_DEPLOY jobs take ~3-5 min; give the rolling deploy time.
        run: sleep 360
      - name: Run e2e probe
        run: python3 backend/tools/e2e.py
        env:
          # The live domain (served via the proxy). The old *.ondigitalocean.app
          # ingress hostname was stale and kept this job — and thus main — red.
          E2E_URL: https://elections.innoedgetech.com
