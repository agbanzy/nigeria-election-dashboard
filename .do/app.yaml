name: ng-election-dashboard
region: fra

services:
  - name: web
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: gunicorn -w 2 -b 0.0.0.0:8080 app.wsgi:app --timeout 120
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /api/health
    routes:
      - path: /api
        preserve_path_prefix: true
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      # IREV_API_KEY intentionally unset — IrevClient uses INEC's public
      # Angular client key by default. Override via the DO console only if
      # INEC rotates the SPA key.
      - key: IREV_API_BASE
        scope: RUN_TIME
        value: https://dolphin-app-sleqh.ondigitalocean.app/api/v1
      - key: SCRAPER_DEFAULT_STATE_ID
        scope: RUN_TIME
        value: "15"
      - key: ENV
        scope: RUN_TIME
        value: production
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: INFO

  - name: frontend
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm ci && npm run build
    run_command: npm start
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3000
    routes:
      - path: /
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: ""
      - key: API_URL
        scope: RUN_TIME
        # Internal service-to-service URL — Next.js credentials provider calls
        # Flask directly (server-side), bypassing the public routing layer.
        value: http://web:8080
      - key: NEXTAUTH_URL
        scope: RUN_TIME
        value: https://elections.innoedgetech.com
      # NEXTAUTH_SECRET: set via DO console or doctl — never commit the value.
      # Generate: openssl rand -base64 32
      # Set: doctl apps update <app-id> --spec updated-spec-with-secret.yaml
      - key: PORT
        scope: RUN_TIME
        value: "3000"
      - key: NODE_ENV
        scope: RUN_TIME
        value: production

workers:
  - name: scraper
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: python -m app.scraper.daemon
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      # IREV_API_KEY intentionally unset — IrevClient uses INEC's public
      # Angular client key by default. Override via the DO console only if
      # INEC rotates the SPA key.
      - key: IREV_API_BASE
        scope: RUN_TIME
        value: https://dolphin-app-sleqh.ondigitalocean.app/api/v1
      - key: SCRAPER_ENABLED
        scope: RUN_TIME
        value: "true"
      # Multiplier on per-tick API budgets + shorter idle sleep. Defaults to
      # 1.0 (polite, ~960 calls/day). Bump to 5.0 to drain ~400 elections in
      # <1 day. 8.0+ may trip INEC rate limits.
      - key: SCRAPER_BURST_FACTOR
        scope: RUN_TIME
        value: "5.0"
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: INFO

databases:
  - name: db
    engine: PG
    version: "16"
    # Reusing the apcng-db managed cluster (user-authorized via AskUserQuestion
    # 2026-06-17, after the account hit its cluster cap). App Platform creates a
    # dedicated database + owner role within the cluster — full DDL rights on its
    # own DB, no PG public-schema gotchas. apcng's own data is isolated.
    cluster_name: apcng-db
    production: true

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: alembic upgrade head
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
  - name: seed
    kind: POST_DEPLOY
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: python -m app.seed
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
  # Header discovery (cheap, ≈7 IReV calls). Idempotent.
  - name: discover-headers
    kind: POST_DEPLOY
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: python -m app.scraper.backfill
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: IREV_API_BASE
        scope: RUN_TIME
        value: https://dolphin-app-sleqh.ondigitalocean.app/api/v1
  # Curated historical seed (CSVs of INEC-certified top-of-ticket totals).
  # Idempotent — uses ingestion_sources.name to skip already-loaded files.
  - name: seed-historical
    kind: POST_DEPLOY
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: python -m app.importer.loaders.seed_historical
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
  # Seed dashboard auth users (idempotent — skips users that already exist).
  - name: seed-users
    kind: POST_DEPLOY
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: python -m app.seed_users
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
