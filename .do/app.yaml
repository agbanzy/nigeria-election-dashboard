name: ng-election-dashboard
region: fra

services:
  - name: web
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: gunicorn -w 2 -b 0.0.0.0:8080 app.wsgi:app --timeout 120
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /api/health
    routes:
      - path: /api
        preserve_path_prefix: true
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: IREV_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: IREV_API_BASE
        scope: RUN_TIME
        value: https://dolphin-app-sleqh.ondigitalocean.app/api/v1
      - key: SCRAPER_DEFAULT_STATE_ID
        scope: RUN_TIME
        value: "15"
      - key: ENV
        scope: RUN_TIME
        value: production
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: INFO

  - name: frontend
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm ci && npm run build
    run_command: npm start
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3000
    routes:
      - path: /
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: ""
      - key: PORT
        scope: RUN_TIME
        value: "3000"
      - key: NODE_ENV
        scope: RUN_TIME
        value: production

workers:
  - name: scraper
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: python -m app.scraper.daemon
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: IREV_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: IREV_API_BASE
        scope: RUN_TIME
        value: https://dolphin-app-sleqh.ondigitalocean.app/api/v1
      - key: SCRAPER_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: INFO

databases:
  - name: db
    engine: PG
    version: "16"
    # Reusing an existing managed cluster (user-authorized via AskUserQuestion).
    # App Platform creates a new database within the cluster, with the app role
    # as its owner — full rights on its own DB, no PG public-schema gotchas.
    cluster_name: unimarket-staging-pg
    production: true

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: alembic upgrade head
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
  - name: seed
    kind: POST_DEPLOY
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: python -m app.seed
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
