name: ng-election-dashboard
region: fra

services:
  - name: web
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: gunicorn -w 2 -b 0.0.0.0:8080 app.wsgi:app --timeout 120
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /api/health
    routes:
      - path: /api
        preserve_path_prefix: true
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      # IREV_API_KEY intentionally unset — IrevClient uses INEC's public
      # Angular client key by default. Override via the DO console only if
      # INEC rotates the SPA key.
      - key: IREV_API_BASE
        scope: RUN_TIME
        value: https://dolphin-app-sleqh.ondigitalocean.app/api/v1
      - key: SCRAPER_DEFAULT_STATE_ID
        scope: RUN_TIME
        value: "15"
      - key: ENV
        scope: RUN_TIME
        value: production
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: INFO

  - name: frontend
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm ci && npm run build
    run_command: npm start
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3000
    routes:
      - path: /
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: ""
      - key: NEXTAUTH_URL
        scope: RUN_TIME
        value: https://elections.innoedgetech.com
      # NEXTAUTH_SECRET and AUTH_USERS are secrets — set via doctl/DO console,
      # never committed.
      #   NEXTAUTH_SECRET: openssl rand -base64 32
      #   AUTH_USERS: JSON array of {email,name,role,passwordHash} (bcrypt hash).
      #     NextAuth validates credentials against this list — no DB needed.
      - key: PORT
        scope: RUN_TIME
        value: "3000"
      - key: NODE_ENV
        scope: RUN_TIME
        value: production

workers:
  - name: scraper
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: python -m app.scraper.daemon
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      # IREV_API_KEY intentionally unset — IrevClient uses INEC's public
      # Angular client key by default. Override via the DO console only if
      # INEC rotates the SPA key.
      - key: IREV_API_BASE
        scope: RUN_TIME
        value: https://dolphin-app-sleqh.ondigitalocean.app/api/v1
      - key: SCRAPER_ENABLED
        scope: RUN_TIME
        value: "true"
      # Multiplier on per-tick API budgets + shorter idle sleep. Defaults to
      # 1.0 (polite, ~960 calls/day). Bump to 5.0 to drain ~400 elections in
      # <1 day. 8.0+ may trip INEC rate limits.
      - key: SCRAPER_BURST_FACTOR
        scope: RUN_TIME
        value: "5.0"
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: INFO

databases:
  - name: db
    engine: PG
    version: "16"
    # Reusing an existing managed cluster (user-authorized via AskUserQuestion).
    # App Platform creates a new database within the cluster, with the app role
    # as its owner — full rights on its own DB, no PG public-schema gotchas.
    cluster_name: unimarket-staging-pg
    production: true

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
    source_dir: backend
    build_command: pip install -r requirements.txt
    # Non-blocking: a migration failure (e.g. the dev-DB role lacking CREATE)
    # must not gate the whole deploy. With no pending schema changes this is a
    # no-op; env.py logs the DB privilege picture either way. Restore a strict
    # `alembic upgrade head` once the DB role owns its schema (managed cluster).
    run_command: alembic upgrade head || echo "migrate: non-fatal failure, continuing with existing schema"
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
  - name: seed
    kind: POST_DEPLOY
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: python -m app.seed
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
  # Header discovery (cheap, ≈7 IReV calls). Idempotent.
  - name: discover-headers
    kind: POST_DEPLOY
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: python -m app.scraper.backfill
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: IREV_API_BASE
        scope: RUN_TIME
        value: https://dolphin-app-sleqh.ondigitalocean.app/api/v1
  # Curated historical seed (CSVs of INEC-certified top-of-ticket totals).
  # Idempotent — uses ingestion_sources.name to skip already-loaded files.
  - name: seed-historical
    kind: POST_DEPLOY
    github:
      repo: agbanzy/fct-election-dashboard
      branch: main
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: python -m app.importer.loaders.seed_historical
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
